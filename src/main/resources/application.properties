quarkus.index-dependency.rimfrost-adapter-arbetsgivare.artifact-id=rimfrost-adapter-arbetsgivare
quarkus.index-dependency.rimfrost-adapter-folkbokford.group-id=se.fk.rimfrost.adapter.folkbokford
quarkus.index-dependency.rimfrost-adapter-folkbokford.artifact-id=rimfrost-adapter-folkbokford
quarkus.index-dependency.rimfrost-framework-handlaggning-adapter.group-id=se.fk.rimfrost.framework.handlaggning
quarkus.index-dependency.rimfrost-framework-handlaggning-adapter.artifact-id=rimfrost-framework-handlaggning-adapter
quarkus.index-dependency.rimfrost-framework-regel.group-id=se.fk.rimfrost.framework.regel
quarkus.index-dependency.rimfrost-framework-regel.artifact-id=rimfrost-framework-regel
quarkus.index-dependency.rimfrost-framework-regel-maskinell.group-id=se.fk.rimfrost.framework.regel.maskinell
quarkus.index-dependency.rimfrost-framework-regel-maskinell.artifact-id=rimfrost-framework-regel-maskinell
quarkus.index-dependency.rimfrost-framework-uppgift-status-provider.group-id=se.fk.rimfrost.framework.uppgiftstatusprovider
quarkus.index-dependency.rimfrost-framework-uppgift-status-provider.artifact-id=rimfrost-framework-uppgift-status-provider

application.config.path=src/main/resource/config.yaml

# Container image configuration
quarkus.container-image.build=true
quarkus.container-image.name=rimfrost-regel-rtf-maskinell
quarkus.container-image.tag=latest
quarkus.container-image.group=rimfrost
quarkus.container-image.push=false

# Kafka configuration
kafka.source=RegelRtfMaskinell

#Incoming
mp.messaging.incoming.regel-requests.connector=smallrye-kafka
mp.messaging.incoming.regel-requests.topic=rtf-maskinell-requests
mp.messaging.incoming.regel-requests.value.deserializer=se.fk.rimfrost.framework.regel.presentation.kafka.RegelRequestDeserializer
mp.messaging.incoming.regel-requests.auto.offset.reset=earliest

#Outgoing
mp.messaging.outgoing.regel-responses.connector=smallrye-kafka
mp.messaging.outgoing.regel-responses.topic=rtf-maskinell-responses
mp.messaging.outgoing.regel-responses.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

%dev.quarkus.kafka.devservices.enabled=true

# REST configuration
%dev.folkbokford.api.base-url=http://localhost:8080
%dev.arbetsgivare.api.base-url=http://localhost:8080
%dev.handlaggning.api.base-url=http://localhost:8080

folkbokford.api.base-url=http://rimfrost-k8s-folkbokford:8080
arbetsgivare.api.base-url=http://rimfrost-k8s-arbetsgivare:8080
handlaggning.api.base-url=http://rimfrost-k8s-handlaggning:8080
